<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>træis · talents</title>
<link rel="icon" type="image/png" href="favicon-dark-512.png">
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --beige: #f4f1e9;
  --beige-50: #faf8f3;
  --beige-100: #efeadf;
  --beige-200: #e4ddcb;
  --navy: #2c3d4e;
  --navy-700: #1f2c39;
  --navy-500: #5a6b7d;
  --navy-300: #8d9aa9;
  --accent-purple: #b580f4;
  --accent-purple-light: #d4b3f9;
  --accent-purple-700: #9a5fd9;
  --accent-purple-soft: rgba(181, 128, 244, 0.10);
  --bg: var(--beige);
  --surface: var(--beige-50);
  --fg-1: var(--navy);
  --fg-2: var(--navy-500);
  --fg-3: var(--navy-300);
  --border: rgba(44, 61, 78, 0.10);
  --border-strong: rgba(44, 61, 78, 0.18);
  --hairline: rgba(44, 61, 78, 0.06);
  --success: #5b8a6b;
  --font-headline: "Red Hat Display", "Avenir Next", "Avenir", sans-serif;
  --font-body: "Avenir Next", "Avenir", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);
  --shadow-sm: 0 1px 2px rgba(44, 61, 78, 0.04);
  --shadow-md: 0 1px 3px rgba(44, 61, 78, 0.05), 0 4px 16px rgba(44, 61, 78, 0.04);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: var(--font-body);
}

html, body {
  background: var(--bg);
  color: var(--fg-1);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

button { font: inherit; color: inherit; cursor: pointer; }

.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ============================================
   HEADER
   ============================================ */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 64px;
  background: var(--bg);
  max-width: 1280px;
  margin: 0 auto;
  width: 100%;
}

.logo-slot {
  width: 126px;
  height: 34px;
}

.logo-slot img {
  height: 100%;
  width: auto;
  display: block;
}

.header-progress {
  display: none;
}

.header-progress-step {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.header-progress-step .num {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border-strong);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--fg-3);
  background: var(--bg);
  transition: all 280ms var(--ease-out);
}

.header-progress-step.active .num {
  border-color: #525e66;
  background: #525e66;
  color: var(--bg);
}

.header-progress-step.active span:last-child {
  color: var(--fg-1);
  font-weight: 600;
}

.header-progress-line {
  width: 22px;
  height: 1px;
  background: var(--border-strong);
}

/* ============================================
   MAIN
   ============================================ */
.main {
  flex: 1;
  padding: 64px 64px 80px;
  max-width: 1280px;
  margin: 0 auto;
  width: 100%;
  position: relative;
}

.eyebrow {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--accent-purple-700);
  margin-bottom: 18px;
}

.headline {
  font-family: var(--font-headline);
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.1;
  color: var(--fg-1);
  margin-bottom: 16px;
}

.job-ref {
  position: absolute;
  top: 64px;
  right: 64px;
}

.job-ref-pill {
  display: inline-flex;
  align-items: center;
  padding: 11px 22px;
  background: #ffffff;
  border: 1px solid rgba(44, 61, 78, 0.08);
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  color: var(--fg-1);
  letter-spacing: -0.012em;
  box-shadow: 0 1px 2px rgba(44, 61, 78, 0.04);
}
.headline .dot { color: #C176DC; font-weight: 500; }

.lead {
  font-size: 16px;
  line-height: 1.55;
  color: var(--fg-2);
  margin-bottom: 48px;
  max-width: 600px;
}

/* ============================================
   TYPE CARDS
   ============================================ */
.type-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.type-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  cursor: pointer;
  transition: all 320ms var(--ease-out);
  text-align: left;
  position: relative;
  overflow: hidden;
  width: 100%;
}

.type-card:hover {
  border-color: var(--accent-purple-light);
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}

.type-card.selected {
  border-color: var(--accent-purple);
  background: #ffffff;
  box-shadow: 0 0 0 4px rgba(181, 128, 244, 0.15), var(--shadow-md);
}

.type-card-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: var(--beige-100);
  color: var(--fg-2);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 18px;
  transition: all 280ms var(--ease-out);
}

.type-card:hover .type-card-icon,
.type-card.selected .type-card-icon {
  background: var(--accent-purple-soft);
  color: var(--accent-purple-700);
}

.type-card-icon svg { width: 22px; height: 22px; }

.type-card-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--fg-1);
  margin-bottom: 8px;
  letter-spacing: -0.012em;
}

.type-card-sub {
  font-size: 14px;
  color: var(--fg-2);
  line-height: 1.5;
  margin-bottom: 16px;
}

.type-card-modules {
  font-size: 11px;
  color: var(--fg-3);
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.type-module-pill {
  padding: 4px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-weight: 500;
}

.type-card.selected .type-module-pill {
  background: var(--accent-purple-soft);
  border-color: rgba(181, 128, 244, 0.3);
  color: var(--accent-purple-700);
}

@media (max-width: 1000px) {
  .header, .main { padding-left: 32px; padding-right: 32px; }
  .type-grid { grid-template-columns: 1fr; }
  .headline { font-size: 36px; }
}
</style>
</head>
<body>

<div class="app">

  <header class="header">
    <div class="logo-slot">
      <img src="Logo_traeis.png" alt="træis">
    </div>
    <nav class="header-progress">
      <div class="header-progress-step active">
        <span class="num">1</span>
        <span>Typ</span>
      </div>
      <div class="header-progress-line"></div>
      <div class="header-progress-step">
        <span class="num">2</span>
        <span>Story</span>
      </div>
      <div class="header-progress-line"></div>
      <div class="header-progress-step">
        <span class="num">3</span>
        <span>Fertig</span>
      </div>
    </nav>
  </header>

  <main class="main">

    <div class="job-ref">
      <span class="job-ref-pill">Vertriebsmitarbeiter:in</span>
    </div>

    <h1 class="headline">
      Was trifft am besten<br>auf Sie zu<span class="dot">?</span>
    </h1>
    <p class="lead">
      Die folgende Bewerbung wird an Ihr Profil angepasst.
    </p>

    <div class="type-grid">

      <button class="type-card" data-type="einsteiger" type="button">
        <span class="type-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 22a8 8 0 0 1 16 0"/>
            <circle cx="10" cy="8" r="5"/>
            <path d="M19 13l3 3-3 3"/>
          </svg>
        </span>
        <div class="type-card-title">Berufseinsteiger:in</div>
        <div class="type-card-sub">
          Erster Job oder bis zu 2 Jahre Berufserfahrung.
        </div>
        <div class="type-card-modules">
          <span class="type-module-pill">Kaufm. Ausbildung</span>
          <span class="type-module-pill">Verkaufspraktika</span>
          <span class="type-module-pill">Nebenjobs im Verkauf</span>
          <span class="type-module-pill">Erste Vertriebsanstellung</span>
        </div>
      </button>

      <button class="type-card" data-type="fachkraft" type="button">
        <span class="type-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </span>
        <div class="type-card-title">Fachkraft</div>
        <div class="type-card-sub">
          Etablierte Berufslaufbahn in einem Fachgebiet. Mehrjährige Praxis,
          klare Schwerpunkte, vielleicht erste Verantwortung.
        </div>
        <div class="type-card-modules">
          <span class="type-module-pill">Vertriebserfahrung</span>
          <span class="type-module-pill">Branchenexpertise</span>
          <span class="type-module-pill">Kundensegmente</span>
          <span class="type-module-pill">Vertriebsweiterbildungen</span>
          <span class="type-module-pill">Umsatzergebnisse</span>
        </div>
      </button>

      <button class="type-card" data-type="querein" type="button">
        <span class="type-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"/>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </span>
        <div class="type-card-title">Quereinsteiger:in</div>
        <div class="type-card-sub">
          Beruflicher Wechsel in eine neue Branche oder ein neues Fach.
          Erfahrung aus einem Gebiet — Lust, das woanders einzubringen.
        </div>
        <div class="type-card-modules">
          <span class="type-module-pill">Vorheriger Beruf</span>
          <span class="type-module-pill">Vertriebsnahe Fähigkeiten</span>
          <span class="type-module-pill">Erste Verkaufserfahrung</span>
          <span class="type-module-pill">Übertragbare Stärken</span>
        </div>
      </button>

      <button class="type-card" data-type="fuehrung" type="button">
        <span class="type-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="7" r="4"/>
            <path d="M17 21v-1a5 5 0 0 0-10 0v1"/>
            <circle cx="5" cy="11" r="3"/>
            <circle cx="19" cy="11" r="3"/>
          </svg>
        </span>
        <div class="type-card-title">Führungskraft</div>
        <div class="type-card-sub">
          Mit Personalverantwortung, Strategie-Aufgaben oder Budget-Hoheit.
          Senior-Level mit klarer Wirkungsspur.
        </div>
        <div class="type-card-modules">
          <span class="type-module-pill">Vertriebsleitung</span>
          <span class="type-module-pill">Geführtes Vertriebsteam</span>
          <span class="type-module-pill">Umsatzverantwortung</span>
          <span class="type-module-pill">Strategische Vertriebserfolge</span>
        </div>
      </button>

    </div>

  </main>

</div>

<script>
document.querySelectorAll('.type-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
  });
});
</script>

</body>
</html>
